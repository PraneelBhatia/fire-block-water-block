<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fire Block &amp; Water Block</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       DESIGN SYSTEM: "Elemental Brutalism" + "Kinetic Fluidity"
       Merged from both Stitch design documents.
       ============================================================ */

    /* === Design Tokens — Minecraft-ish Earthy Theme === */
    :root {
      /* Fire Palette */
      --fire: #ff6d3a;
      --fire-light: #ffab91;
      --fire-container: #ff8a50;
      --fire-glow: rgba(255, 109, 58, 0.35);
      --fire-glow-strong: rgba(255, 109, 58, 0.6);

      /* Water Palette */
      --water: #42a5f5;
      --water-light: #90caf9;
      --water-container: #64b5f6;
      --water-glow: rgba(66, 165, 245, 0.35);
      --water-glow-strong: rgba(66, 165, 245, 0.6);

      /* Surface Tiers (earthy, warm, bright) */
      --bg: #f5ebe0;
      --surface: #ede0d4;
      --surface-low: #e6d5c3;
      --surface-mid: #dbc7b0;
      --surface-high: #c9b99a;
      --surface-highest: #b8a88a;

      /* Text */
      --on-surface: #3e2c1c;
      --on-surface-variant: rgba(62, 44, 28, 0.65);
      --on-surface-dim: rgba(62, 44, 28, 0.4);

      /* Feedback */
      --success: #4caf50;
      --success-glow: rgba(76, 175, 80, 0.4);
      --error: #e53935;

      /* Fonts — Silkscreen: pixel/game feel for display.
         Nunito: friendly rounded for body. */
      --font-display: 'Silkscreen', cursive;
      --font-body: 'Nunito', system-ui, sans-serif;

      /* Radii — blockier, less pill-y */
      --r-sm: 0.25rem;
      --r-md: 0.4rem;
      --r-lg: 0.6rem;
      --r-xl: 0.8rem;
      --r-pill: 0.5rem;

      /* Timing */
      --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* === Reset & Base === */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      color: var(--on-surface);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* === Scrollbar (subtle) === */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-high); border-radius: 2px; }

    /* === Selection === */
    ::selection { background: rgba(255, 109, 58, 0.3); color: #3e2c1c; }

    /* === Canvas & Overlay === */
    #game-canvas { width: 100%; height: 100%; display: block; }
    #ui-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    #ui-overlay > * { pointer-events: auto; }
    #lobby { width: 100%; height: 100%; }

    /* Film grain removed — bright clean look */

    /* =============================
       KEYFRAME ANIMATIONS
       ============================= */
    @keyframes fireGlow {
      0%, 100% { text-shadow: 0 0 12px var(--fire-glow), 0 0 40px rgba(255, 86, 37, 0.2); }
      50% { text-shadow: 0 0 24px var(--fire-glow-strong), 0 0 60px rgba(255, 121, 67, 0.3), 0 0 80px rgba(255, 140, 0, 0.15); }
    }
    @keyframes waterGlow {
      0%, 100% { text-shadow: 0 0 12px var(--water-glow), 0 0 40px rgba(0, 205, 208, 0.2); }
      50% { text-shadow: 0 0 24px var(--water-glow-strong), 0 0 60px rgba(70, 234, 237, 0.3), 0 0 80px rgba(119, 223, 255, 0.15); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9) translateY(12px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes waitingDots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
    @keyframes shake {
      0%, 100% { transform: translate(-50%, -50%); }
      10%, 50%, 90% { transform: translate(calc(-50% - 5px), -50%); }
      30%, 70% { transform: translate(calc(-50% + 5px), -50%); }
    }
    @keyframes starPop {
      0% { transform: scale(0) rotate(-30deg); opacity: 0; }
      60% { transform: scale(1.3) rotate(5deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes successGlow {
      0%, 100% { text-shadow: 0 0 16px var(--success-glow), 0 0 50px rgba(102, 187, 106, 0.2); }
      50% { text-shadow: 0 0 28px rgba(102, 187, 106, 0.7), 0 0 70px rgba(102, 187, 106, 0.3); }
    }
    @keyframes deathFlash {
      0% { opacity: 1; background: rgba(239, 83, 80, 0.25); }
      100% { opacity: 0; background: rgba(239, 83, 80, 0); }
    }
    @keyframes fireFlicker {
      0%, 100% { transform: scaleY(1) scaleX(1); opacity: 0.85; }
      25% { transform: scaleY(1.18) scaleX(0.88); opacity: 1; }
      50% { transform: scaleY(0.88) scaleX(1.12); opacity: 0.7; }
      75% { transform: scaleY(1.12) scaleX(0.92); opacity: 0.95; }
    }
    @keyframes waterWave {
      0% { transform: translateX(0) scaleY(1); }
      25% { transform: translateX(3px) scaleY(1.08); }
      50% { transform: translateX(0) scaleY(0.92); }
      75% { transform: translateX(-3px) scaleY(1.04); }
      100% { transform: translateX(0) scaleY(1); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -40px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }
    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-40px, 30px) scale(0.9); }
      66% { transform: translate(25px, -15px) scale(1.05); }
    }
    @keyframes staggerIn {
      from { opacity: 0; transform: translateY(16px) scale(0.92); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* =============================
       LOBBY
       ============================= */
    .lobby-container {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; position: relative; overflow: hidden;
      background:
        radial-gradient(ellipse 60% 40% at 25% 50%, rgba(255, 109, 58, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 75% 50%, rgba(66, 165, 245, 0.12) 0%, transparent 70%),
        linear-gradient(180deg, #b8d8e8 0%, var(--bg) 100%);
      padding: 0 24px;
    }
    /* Floating orbs removed — using background image instead */

    /* Title — Stacked layout */
    .lobby-title-row {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 8px;
      animation: fadeInUp 0.7s var(--ease-smooth);
      position: relative;
    }

    .title-fire {
      font-family: var(--font-display);
      font-weight: 700; font-size: clamp(1.6rem, 5vw, 2.8rem);
      letter-spacing: 0.08em;
      color: var(--fire);
      text-shadow: 0 2px 0 #c43e00, 0 0 20px var(--fire-glow);
      text-transform: uppercase;
    }
    .title-amp {
      font-family: var(--font-body);
      font-weight: 700; font-size: 0.75rem;
      color: var(--on-surface-variant);
      margin: 2px 0;
      letter-spacing: 8px;
      text-transform: uppercase;
    }
    .title-water {
      font-family: var(--font-display);
      font-weight: 700; font-size: clamp(1.6rem, 5vw, 2.8rem);
      letter-spacing: 0.08em;
      color: var(--water);
      text-shadow: 0 2px 0 #1565c0, 0 0 20px var(--water-glow);
      text-transform: uppercase;
    }

    .lobby-tagline {
      font-family: var(--font-body);
      color: var(--on-surface-dim);
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      margin-top: 12px;
      margin-bottom: 44px;
      animation: fadeInUp 0.7s var(--ease-smooth) 0.15s both;
    }

    /* Room Code Box (glassmorphism — NO border) */
    .lobby-room-code-box {
      display: none;
      background: var(--surface);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      border-radius: var(--r-xl); padding: 28px 40px;
      text-align: center; margin-bottom: 24px;
      border: 2px solid var(--surface-high);
      box-shadow: 0 8px 32px rgba(62, 44, 28, 0.15);
      animation: fadeInUp 0.5s var(--ease-bounce);
    }
    .lobby-room-code-label {
      font-family: var(--font-display);
      color: var(--on-surface-dim);
      font-size: 0.7rem; font-weight: 400;
      text-transform: uppercase; letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .lobby-room-code-value {
      font-family: var(--font-display);
      font-weight: 700; font-size: 2.6rem; letter-spacing: 10px;
      background: linear-gradient(135deg, var(--fire), #e64a19);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      cursor: pointer;
      transition: filter 0.2s;
    }
    .lobby-room-code-value:hover { filter: brightness(1.2); }
    .lobby-room-code-copy-hint {
      color: var(--on-surface-dim);
      font-size: 0.7rem; font-weight: 600; margin-top: 6px;
      transition: color 0.2s;
    }
    .lobby-waiting {
      color: var(--on-surface-variant);
      font-size: 0.8rem; font-weight: 600; margin-top: 12px;
    }
    .lobby-waiting::after {
      content: '';
      animation: waitingDots 1.5s steps(4) infinite;
    }

    /* =============================
       BUTTONS — "Bubbly" Pill Style
       ============================= */
    .btn-fire {
      font-family: var(--font-display);
      font-weight: 700; font-size: 1rem;
      padding: 16px 44px; border-radius: var(--r-pill);
      border: 2px solid rgba(196, 62, 0, 0.3);
      background: linear-gradient(180deg, var(--fire-light) 0%, var(--fire) 50%, #e64a19 100%);
      color: #fff; cursor: pointer;
      transition: all 0.3s var(--ease-bounce);
      animation: fadeInUp 0.7s var(--ease-smooth) 0.3s both;
      text-transform: uppercase; letter-spacing: 1.5px;
      box-shadow: 0 4px 16px var(--fire-glow), 0 2px 0 #c43e00;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }
    .btn-fire::before {
      content: '';
      position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }
    .btn-fire:hover::before { left: 100%; }
    .btn-fire:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 28px var(--fire-glow-strong), 0 4px 10px rgba(62, 44, 28, 0.25);
    }
    .btn-fire:active:not(:disabled) {
      transform: translateY(0) scale(0.97);
      box-shadow: 0 2px 16px var(--fire-glow);
    }
    .btn-fire:disabled {
      opacity: 0.7; cursor: default;
      filter: saturate(0.7);
      box-shadow: 0 2px 8px var(--fire-glow);
    }

    .btn-water {
      font-family: var(--font-display);
      font-weight: 700; font-size: 1rem;
      padding: 14px 36px; border-radius: var(--r-pill);
      border: 2px solid rgba(21, 101, 192, 0.3);
      background: linear-gradient(180deg, var(--water-light) 0%, var(--water) 50%, #1976d2 100%);
      color: #fff; cursor: pointer;
      transition: all 0.3s var(--ease-bounce);
      text-transform: uppercase; letter-spacing: 1px;
      box-shadow: 0 4px 16px var(--water-glow), 0 2px 0 #1565c0;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }
    .btn-water::before {
      content: '';
      position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }
    .btn-water:hover::before { left: 100%; }
    .btn-water:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 28px var(--water-glow-strong), 0 4px 10px rgba(62, 44, 28, 0.25);
    }
    .btn-water:active:not(:disabled) {
      transform: translateY(0) scale(0.97);
    }
    .btn-water:disabled { opacity: 0.4; cursor: default; }

    .btn-secondary {
      font-family: var(--font-body);
      font-weight: 600; font-size: 0.9rem;
      padding: 12px 28px; border-radius: var(--r-pill);
      border: none;
      background: var(--surface-high);
      color: var(--on-surface-variant); cursor: pointer;
      transition: all 0.25s var(--ease-smooth);
    }
    .btn-secondary:hover {
      background: var(--surface-highest);
      color: var(--on-surface);
      transform: translateY(-1px);
    }
    .btn-secondary:active { transform: scale(0.97); }

    .btn-text-link {
      font-family: var(--font-body);
      font-size: 0.8rem; font-weight: 600;
      background: none; border: none;
      color: var(--on-surface-dim); cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
      padding: 6px 10px;
      letter-spacing: 0.5px;
    }
    .btn-text-link:hover { color: var(--on-surface); }

    /* =============================
       LOBBY INPUT — Recessed Dark
       ============================= */
    .lobby-input {
      padding: 14px 20px; border-radius: var(--r-pill);
      border: none;
      background: var(--surface);
      color: var(--on-surface); font-size: 1rem;
      text-transform: uppercase; width: 200px;
      outline: none; letter-spacing: 3px;
      font-family: var(--font-display);
      font-weight: 600;
      transition: background 0.3s, box-shadow 0.3s;
      box-shadow: inset 0 2px 6px rgba(62, 44, 28, 0.1);
    }
    .lobby-input::placeholder {
      color: var(--on-surface-dim);
      text-transform: none; letter-spacing: 0;
      font-family: var(--font-body);
      font-weight: 500;
    }
    .lobby-input:focus {
      background: var(--surface-low);
      box-shadow: inset 0 2px 6px rgba(62, 44, 28, 0.1), 0 0 0 2px rgba(66, 165, 245, 0.25);
    }

    /* Divider — subtle tonal shift, no lines */
    .lobby-divider {
      display: flex; align-items: center; gap: 16px;
      width: 300px; margin: 24px 0;
      animation: fadeInUp 0.7s var(--ease-smooth) 0.4s both;
    }
    .lobby-divider-line {
      flex: 1; border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--surface-high), transparent);
    }
    .lobby-divider-text {
      color: var(--on-surface-dim);
      font-family: var(--font-display);
      font-size: 0.7rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 3px;
    }

    .lobby-join-row {
      display: flex; gap: 12px; align-items: center;
      animation: fadeInUp 0.7s var(--ease-smooth) 0.5s both;
    }

    .lobby-error {
      color: var(--error); font-size: 0.8rem; font-weight: 600;
      min-height: 1.2em; margin-top: 12px;
      animation: fadeIn 0.3s ease-out;
    }

    /* =============================
       HUD — Glassmorphic Tectonic Plates
       Asymmetric layout: spread across screen edges
       ============================= */
    .hud-panel {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; pointer-events: none;
    }
    .hud-panel > * { pointer-events: auto; }
    /* Top-left cluster: connection + level */
    .hud-panel .hud-item:nth-child(1),
    .hud-panel .hud-item:nth-child(2) {
      position: absolute; top: 20px; left: 20px;
    }
    .hud-panel .hud-item:nth-child(2) { top: 60px; }
    /* Bottom-right: moves counter */
    .hud-panel .hud-item:nth-child(3) {
      position: absolute; bottom: 28px; right: 24px;
    }
    /* Top-right: fall-off toggle */
    .hud-panel .hud-item:nth-child(4) {
      position: absolute; top: 20px; right: 24px;
    }
    /* Bottom-left: level select button */
    .hud-panel .hud-btn-levels {
      position: absolute; bottom: 28px; left: 24px;
    }
    .hud-item {
      background: var(--surface);
      backdrop-filter: blur(12px) saturate(1.2);
      -webkit-backdrop-filter: blur(12px) saturate(1.2);
      padding: 10px 16px; border-radius: var(--r-md);
      border: 2px solid var(--surface-high);
      display: flex; align-items: center; gap: 10px;
      font-size: 0.85rem;
      box-shadow: 0 4px 12px rgba(62, 44, 28, 0.12);
      transition: background 0.2s;
    }
    .hud-item:hover {
      background: var(--surface-low);
    }
    .hud-label {
      font-family: var(--font-display);
      color: var(--on-surface-dim);
      font-size: 0.65rem; font-weight: 400;
      text-transform: uppercase; letter-spacing: 2px;
    }
    .hud-value {
      color: var(--on-surface); font-weight: 700;
      font-family: var(--font-display);
      font-size: 0.9rem;
    }
    .hud-room-code {
      color: var(--on-surface-variant);
      font-family: var(--font-display);
      font-size: 0.7rem; font-weight: 400; letter-spacing: 1.5px;
    }
    .hud-icon {
      display: flex; align-items: center;
      color: var(--on-surface-variant);
      line-height: 1;
    }
    .hud-btn-levels {
      background: var(--surface);
      backdrop-filter: blur(12px) saturate(1.2);
      -webkit-backdrop-filter: blur(12px) saturate(1.2);
      padding: 10px 18px; border-radius: var(--r-md);
      border: 2px solid var(--surface-high);
      color: var(--fire); font-size: 0.7rem; font-weight: 700;
      cursor: pointer; transition: all 0.25s var(--ease-smooth);
      font-family: var(--font-display);
      text-transform: uppercase; letter-spacing: 2px;
      box-shadow: 0 4px 12px rgba(62, 44, 28, 0.12);
    }
    .hud-btn-levels:hover {
      background: var(--surface-low);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(62, 44, 28, 0.18), 0 0 12px var(--fire-glow);
    }
    .hud-connection-dot {
      width: 6px; height: 6px; border-radius: 50%;
      display: inline-block;
    }
    .hud-connection-dot.connected {
      background: var(--success);
      box-shadow: 0 0 8px var(--success-glow);
      animation: pulseGlow 2s ease-in-out infinite;
    }
    .hud-connection-dot.disconnected {
      background: var(--error);
      box-shadow: 0 0 8px rgba(239, 83, 80, 0.5);
    }

    /* =============================
       LEVEL COMPLETE — Glassmorphic Modal
       ============================= */
    .lc-backdrop {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, rgba(76, 175, 80, 0.08) 0%, rgba(62, 44, 28, 0.6) 70%);
      display: none; align-items: center; justify-content: center;
    }
    .lc-panel {
      text-align: center;
      animation: modalIn 0.5s var(--ease-bounce);
      background: var(--surface);
      border: 2px solid var(--surface-high);
      border-radius: var(--r-xl); padding: 48px 56px;
      box-shadow: 0 24px 64px rgba(62, 44, 28, 0.2);
    }
    .lc-star {
      display: inline-block;
      line-height: 1;
      animation: starPop 0.7s var(--ease-bounce) 0.2s both;
      filter: drop-shadow(0 0 14px rgba(245, 166, 35, 0.5));
    }
    .lc-heading {
      font-family: var(--font-display);
      font-weight: 700; font-size: 2rem;
      letter-spacing: -0.02em;
      color: var(--success);
      animation: successGlow 3s ease-in-out infinite;
      margin: 16px 0 10px;
    }
    .lc-moves {
      font-family: var(--font-body);
      color: var(--on-surface-variant);
      font-size: 0.85rem; font-weight: 600;
      margin-bottom: 32px;
    }
    .lc-moves-value {
      color: var(--on-surface);
      font-family: var(--font-display);
      font-weight: 700;
    }
    .lc-btn-row {
      display: flex; gap: 14px; justify-content: center;
      margin-bottom: 16px;
    }

    /* =============================
       LEVEL SELECT — Tectonic Grid
       ============================= */
    .ls-backdrop {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(62, 44, 28, 0.6);
      backdrop-filter: blur(8px);
      z-index: 100;
      animation: fadeIn 0.25s ease-out;
    }
    .ls-panel {
      background: var(--surface);
      border: 2px solid var(--surface-high);
      border-radius: var(--r-xl); padding: 36px 40px;
      text-align: center;
      animation: modalIn 0.4s var(--ease-bounce);
      max-width: 440px; width: 90%;
      max-height: 85vh; overflow-y: auto;
      box-shadow: 0 24px 64px rgba(62, 44, 28, 0.2);
    }
    .ls-title {
      font-family: var(--font-display);
      font-weight: 700; font-size: 1.2rem;
      color: var(--on-surface);
      margin-bottom: 28px; letter-spacing: 3px; text-transform: uppercase;
    }
    .ls-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px; margin-bottom: 28px;
    }
    .ls-btn {
      width: 58px; height: 58px; border-radius: var(--r-md);
      border: none;
      background: var(--surface-mid);
      color: var(--on-surface-variant);
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 700;
      cursor: pointer;
      transition: all 0.3s var(--ease-bounce);
      position: relative;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      animation: staggerIn 0.4s var(--ease-bounce) both;
    }
    /* Staggered entrance for level buttons */
    .ls-btn:nth-child(1)  { animation-delay: 0.05s; }
    .ls-btn:nth-child(2)  { animation-delay: 0.08s; }
    .ls-btn:nth-child(3)  { animation-delay: 0.11s; }
    .ls-btn:nth-child(4)  { animation-delay: 0.14s; }
    .ls-btn:nth-child(5)  { animation-delay: 0.17s; }
    .ls-btn:nth-child(6)  { animation-delay: 0.20s; }
    .ls-btn:nth-child(7)  { animation-delay: 0.23s; }
    .ls-btn:nth-child(8)  { animation-delay: 0.26s; }
    .ls-btn:nth-child(9)  { animation-delay: 0.29s; }
    .ls-btn:nth-child(10) { animation-delay: 0.32s; }
    .ls-btn:hover {
      background: linear-gradient(135deg, var(--fire), var(--fire-container));
      color: #fff;
      transform: translateY(-3px) scale(1.08);
      box-shadow: 0 8px 20px var(--fire-glow), 0 4px 8px rgba(62, 44, 28, 0.2);
    }
    .ls-btn.current {
      background: rgba(255, 109, 58, 0.2);
      color: var(--fire);
      box-shadow: 0 0 0 2px rgba(255, 109, 58, 0.3), 0 4px 12px var(--fire-glow);
    }
    .ls-btn-name {
      position: absolute;
      bottom: -20px; left: 50%; transform: translateX(-50%);
      white-space: nowrap;
      font-size: 0.55rem; font-family: var(--font-body); font-weight: 600;
      color: var(--on-surface-dim);
      opacity: 0; transition: opacity 0.2s;
      pointer-events: none;
      letter-spacing: 0.5px;
    }
    .ls-btn:hover .ls-btn-name { opacity: 1; }

    /* =============================
       DEATH OVERLAY
       ============================= */
    .death-overlay {
      position: absolute; bottom: 120px; left: 50%;
      transform: translateX(-50%);
      padding: 12px 28px; border-radius: var(--r-md);
      background: rgba(229, 57, 53, 0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 2px solid rgba(229, 57, 53, 0.25);
      animation: fadeInUp 0.3s var(--ease-bounce), deathFlash 2s ease-out 0.5s forwards;
      pointer-events: none; z-index: 200;
      box-shadow: 0 0 24px rgba(229, 57, 53, 0.2);
    }
    .death-overlay-text {
      font-family: var(--font-display);
      font-weight: 700; font-size: 1.2rem;
      color: var(--error);
      text-shadow: 0 0 20px rgba(239, 83, 80, 0.5);
    }

    /* =============================
       CONTROLS HINT
       ============================= */
    .controls-hint {
      font-family: var(--font-body);
      color: var(--on-surface-dim);
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 20px;
      text-align: center;
    }
    .controls-hint kbd {
      display: inline-block;
      background: var(--surface-mid);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: var(--font-display);
      font-size: 0.65rem;
      color: var(--on-surface-variant);
      margin: 0 2px;
    }

    /* In-game controls overlay — shown at level start, fades out */
    .hud-controls-overlay {
      position: absolute;
      bottom: 80px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 32px; align-items: center;
      background: var(--surface);
      border: 2px solid var(--surface-high);
      border-radius: var(--r-md);
      padding: 14px 28px;
      box-shadow: 0 4px 16px rgba(62, 44, 28, 0.15);
      animation: controlsFadeOut 6s ease-in forwards;
      pointer-events: none;
      z-index: 50;
    }
    .hud-controls-overlay .control-group {
      display: flex; align-items: center; gap: 8px;
    }
    .hud-controls-overlay kbd {
      display: inline-block;
      background: var(--surface-mid);
      padding: 4px 10px;
      border-radius: 4px;
      font-family: var(--font-display);
      font-size: 0.7rem;
      color: var(--on-surface);
      border: 1px solid var(--surface-high);
    }
    .hud-controls-overlay .control-label {
      font-family: var(--font-display);
      font-size: 0.65rem;
      color: var(--on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .hud-controls-overlay .control-label.fire { color: var(--fire); }
    .hud-controls-overlay .control-label.water { color: var(--water); }
    @keyframes controlsFadeOut {
      0%, 70% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui-overlay">
    <div id="lobby"></div>
    <div id="hud" style="display:none;"></div>
    <div id="level-complete" style="display:none;"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
